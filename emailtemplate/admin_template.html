<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            color: #333;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 8px;
        }

        .header {
            background: #007bff;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px 8px 0 0;
            text-align: center;
        }

        .content {
            padding: 20px;
        }

        .field {
            margin-bottom: 10px;
        }

        .label {
            font-weight: bold;
            color: #555;
        }

        .footer {
            font-size: 12px;
            color: #888;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h2>New Inquiry Received</h2>
        </div>
        <div class="content">
            <div class="field"><span class="label">Name:</span> {{name}}</div>
            <div class="field"><span class="label">Email:</span> {{email}}</div>
            <div class="field"><span class="label">Phone:</span> {{phone}}</div>
            <div class="field"><span class="label">Message:</span><br>{{message}}</div>
        </div>
        <div class="footer">
            This inquiry was sent from your website's contact form.
        </div>
    </div>
</body>

</html>
